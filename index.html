<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serpientes Función — v2 con Derivadas</title>
    <style>
        /* Estilos como en tu código original */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #080816;
            font-family: 'Courier New', monospace;
            color: #e0e0ff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* ... otros estilos ... */
    </style>
</head>
<body>
    <div id="game-wrap">
        <!-- HUD, Enemy HUD y Canvas como en tu código original -->
        <div id="hud">
            <!-- Contenido del HUD -->
        </div>
        <div id="enemy-hud">
            <!-- Contenido del Enemy HUD -->
        </div>
        <div id="canvas-wrap">
            <canvas id="c"></canvas>
            <canvas id="deathCanvas"></canvas>
            <div id="pause-overlay" style="display:none;">
                <h2 style="font-size:20px;color:#ffcc44;">⏸ PAUSADO</h2>
                <div>
                    <button onclick="togglePause()" class="ctrl-btn">▶ Continuar</button>
                    <button onclick="confirmRestart()" class="ctrl-btn">↺ Reiniciar nivel</button>
                    <button onclick="goToMenu()" class="ctrl-btn">⌂ Menú principal</button>
                </div>
            </div>
            <div id="overlay">
                <h2 id="ov-title">Serpientes Función</h2>
                <p class="sub" id="ov-desc">Derrota serpientes-función para aprender sus propiedades matemáticas. Luego enfrentarás a sus parientes: ¡Las Derivadas!</p>
                <button id="ov-btn">Comenzar</button>
            </div>
        </div>
        <div class="ctrl-bar">
            <button class="ctrl-btn" id="btn-pause" onclick="togglePause()">⏸ Pausar (P)</button>
            <button class="ctrl-btn" onclick="confirmRestart()">↺ Reiniciar nivel</button>
            <button class="ctrl-btn" onclick="goToMenu()">⌂ Menú</button>
        </div>
        <div id="controls-hint">Flechas / WASD: mover &nbsp;|&nbsp; Espacio: disparar &nbsp;|&nbsp; P: pausar</div>
    </div>

    <script>
        // ─── CANVAS SETUP ─────────────────────────────────────────────────────────────  
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const dCanvas = document.getElementById('deathCanvas');
        const dCtx = dCanvas.getContext('2d');
        const CELL = 16, COLS = 42, ROWS = 38;
        const W = COLS * CELL, H = ROWS * CELL;
        canvas.width = W; 
        canvas.height = H;
        dCanvas.width = W; 
        dCanvas.height = H;

        // Inicializa las funciones necesarias del juego  
        let isPaused = false;

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-overlay').style.display = isPaused ? 'flex' : 'none';
        }

        function confirmRestart() {
            // Lógica para reiniciar el nivel  
            console.log("Reiniciando nivel...");
        }

        function goToMenu() {
            // Lógica para ir al menú  
            console.log("Regresando al menú principal...");
        }

        // ─── MATH CARD BUILDER ────────────────────────────────────────────────────────  
        function buildMathCard(e) {
            const d = e.mathDef;
            let html = `<div class="math-card">`;
            html += `<h3>📐 ${e.name}</h3>`;
            html += `<div class="fx-big">${e.fx}</div>`;

            // badges  
            html += `<div class="math-row">`;
            html += `<span class="badge neutral">Dom: ${d.dominio}</span>`;
            html += `<span class="badge neutral">Rec: ${d.recorrido}</span>`;
            html += `<span class="badge ${d.inyectiva ? 'yes' : 'no'}">Inyectiva: ${d.inyectiva ? '✓ Sí' : '✗ No'}</span>`;
            html += `<span class="badge ${d.sobreyectiva ? 'yes' : 'no'}">Sobreyectiva: ${d.sobreyectiva ? '✓ Sí' : '✗ No'}</span>`;
            html += `<span class="badge ${d.biyectiva ? 'yes' : 'no'}">Biyectiva: ${d.biyectiva ? '✓ Sí' : '✗ No'}</span>`;
            html += `<span class="badge ${d.inversa ? 'yes' : 'no'}">Inversa: ${d.inversa ? '✓ Admite' : '✗ No admite'}</span>`;
            html += `</div>`;

            html += `<div class="math-def"><strong>Definición:</strong> ${d.definicion}</div>`;
            html += `<div class="math-def"><strong>Propiedades:</strong> ${d.propiedades}</div>`;
            if (d.inversaDef) html += `<div class="math-def"><strong>Inversa:</strong> ${d.inversaDef}</div>`;
            html += `<div class="math-def" style="color:#aaddbb"><strong>Aplicaciones:</strong> ${d.apps}</div>`;

            html += `</div>`;
            return html;
        }

        // Funciones adicionales para el juego  
        function startGame() {
            // Lógica para iniciar el juego  
            console.log("Iniciando el juego...");
        }

        // Asignar el evento click al botón para comenzar  
        document.getElementById('ov-btn').onclick = startGame;
    </script>
</body>
</html>
